<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CoolChat Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;

    background:
    linear-gradient(
        135deg,
        #667eea,
        #764ba2,
        #6b8cff
    );

    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.background-circle{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.5;
}

.circle1{
    width:300px;
    height:300px;
    background:#ffffff55;
    top:-80px;
    left:-80px;
}

.circle2{
    width:250px;
    height:250px;
    background:#ffffff33;
    bottom:-60px;
    right:-60px;
}

.container{
    width:380px;
    position:relative;
    z-index:10;
}

.login-card{

    background:
    rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:24px;

    padding:45px 35px;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.2);

    color:white;
}

.logo{
    text-align:center;
    margin-bottom:10px;
    font-size:42px;
    font-weight:700;
}

.tagline{
    text-align:center;
    margin-bottom:35px;
    color:#e7e7e7;
    font-size:14px;
}

.input-group{
    margin-bottom:18px;
}

.input-box{
    width:100%;
    padding:14px 16px;

    border:none;

    border-radius:14px;

    outline:none;

    background:
    rgba(255,255,255,0.18);

    color:white;

    font-size:14px;

    transition:0.3s;
}

.input-box::placeholder{
    color:#eeeeee;
}

.input-box:focus{

    background:
    rgba(255,255,255,0.25);

    transform:scale(1.02);
}

.login-btn{
    width:100%;

    padding:14px;

    border:none;

    border-radius:14px;

    background:white;

    color:#5f4bdb;

    font-size:15px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;

    margin-top:10px;
}

.login-btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 20px rgba(0,0,0,0.2);
}

.bottom-text{
    text-align:center;
    margin-top:25px;
    font-size:14px;
    color:#f1f1f1;
}

.bottom-text a{
    color:white;
    font-weight:600;
    text-decoration:none;
}

.message{
    margin-top:18px;
    text-align:center;
    font-size:14px;
}

.success{
    color:#8cffc1;
}

.error{
    color:#ffd4d4;
}

</style>
</head>

<body>

<div class="background-circle circle1"></div>

<div class="background-circle circle2"></div>

<div class="container">

    <div class="login-card">

        <div class="logo">
            CoolChat
        </div>

        <div class="tagline">
            Connect. Share. Chill.
        </div>

        <form id="loginForm">

            <div class="input-group">

                <input
                    type="text"
                    id="username_or_email"
                    class="input-box"
                    placeholder="Username or Email"
                    required
                >

            </div>

            <div class="input-group">

                <input
                    type="password"
                    id="password"
                    class="input-box"
                    placeholder="Password"
                    required
                >

            </div>

            <button
                type="submit"
                class="login-btn"
            >
                Login
            </button>

        </form>

        <div
            id="message"
            class="message"
        ></div>

        <div class="bottom-text">

            Don't have an account?

            <a href="signup.html">
                Sign Up
            </a>

        </div>

    </div>

</div>

<script>

const existingUser = JSON.parse(
    localStorage.getItem("user")
)

if(existingUser){

    window.location.href =
        "home.html"
}

const loginForm =
    document.getElementById("loginForm")

const messageDiv =
    document.getElementById("message")

loginForm.addEventListener(
    "submit",
    async function(e){

        e.preventDefault()

        const username_or_email =
            document.getElementById(
                "username_or_email"
            ).value

        const password =
            document.getElementById(
                "password"
            ).value

        try{

            const response = await fetch(
                "http://127.0.0.1:5000/login",
                {
                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({
                        username_or_email,
                        password
                    })
                }
            )

            const responseType =
                response.headers.get("content-type") || ""

            const data = responseType.includes("application/json")
                ? await response.json()
                : {
                    success:false,
                    message:`Request failed with status ${response.status}`
                }

            if(response.ok && data.success){

                localStorage.setItem(
                    "user",
                    JSON.stringify(data.user)
                )

                messageDiv.className =
                    "message success"

                messageDiv.innerText =
                    "Login successful 🚀"

                setTimeout(() => {

                    window.location.href =
                        "home.html"

                },1000)

            }else{

                messageDiv.className =
                    "message error"

                messageDiv.innerText =
                    data.message
            }

        }catch(error){

            messageDiv.className =
                "message error"

            messageDiv.innerText =
                `Server error: ${error.message || "Unable to reach API"}`
        }
    }
)

</script>

</body>
</html>
